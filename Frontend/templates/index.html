<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://unicons.iconscout.com/release/v4.2.0/css/line.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <title>Login Page</title>
</head>
<body>
    <div class="container">

        <div class="forms">

            <div class="form login">
                <span class="title">Login</span>
                <form action="#">

                   <div class="input-field">
                     <input type="text" id="login-email" placeholder= "Enter your email" required>
                    <i class="uil uil-envelope-alt icon"></i>
                   </div>

                   <div class="input-field">
                     <input type="password" id="login-password" class= 'password' placeholder= "Enter your password" required>
                    <i class="uil uil-padlock icon"></i>
                    <i class="uil uil-eye-slash ShowHidePw"></i>
                   </div>

                  <div class="input-field button">
                        <button type="button" class="btn" onclick="loginUser()">
                        Login Now
                        </button> 
                 </div>

                </form>

                <div class="login-signup">
                    <span class="text">Not a member ?
                        <a href="./signup" class="text signup-text">Sign up </a>
                    </span>
                </div>

            </div>

        </div>

    </div>

</body>
<script src="{{ url_for('static', filename='js/script.js') }}"></script>
<script src="{{ url_for('static', filename='js/index.js') }}"></script>

</html>
