<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create an Account</title>
    <!-- Modern Typography -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Background Animated Elements -->
    <div class="blob shape-1"></div>
    <div class="blob shape-2"></div>
    <div class="blob shape-3"></div>

    <main class="container">
        <form class="auth-form" id="signupForm">
            <div class="header">
                <h1>Create an Account</h1>
                <p>Start your amazing journey with us today.</p>
            </div>
            <div class="row">
                <div class="input-group half">
                    <input type="text" id="firstName" required autocomplete="off">
                    <label for="firstName">First Name</label>
                </div>
                <div class="input-group half">
                    <input type="text" id="lastName" required autocomplete="off">
                    <label for="lastName">Last Name</label>
                </div>
            </div>
            <div class="input-group">
                <input type="email" id="regEmail" required autocomplete="off">
                <label for="regEmail">Email Address</label>
            </div>
            <div class="input-group">
                <input type="password" id="regPassword" required autocomplete="off">
                <label for="regPassword">Password</label>
            </div>
            <button type="submit" class="submit-btn" id="signupBtn">Sign Up</button>
            <p class="footer-text">Already have an account? <a href="index.html">Log In</a></p>
        </form>
    </main>

    <script src="script.js"></script>
</body>
</html>
